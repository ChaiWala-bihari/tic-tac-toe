name: Tic-Tac-Toe Bot

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  play:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install PyGithub

      - run: python scripts/tictactoe.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
